<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحصيل من عميل</title>
    <link rel="stylesheet" href="../../assets/styles/main.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <style>
        .content { padding: 30px; max-width: 800px; margin: 0 auto; }
        .form-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-control { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-color); }
        .btn-primary { width: 100%; padding: 12px; font-size: 1.1rem; margin-top: 20px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-primary:hover { background: #1d4ed8; }
        .nav-actions { display: flex; gap: 10px; margin-right: 20px; }
        .btn-nav { padding: 5px 15px; border-radius: 4px; background: rgba(255,255,255,0.1); color: white; text-decoration: none; font-size: 0.9rem; }
        .btn-nav:hover, .btn-nav.active { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="receipt.js"></script>
    <script src="../../assets/js/theme.js"></script>
</body>
</html>
