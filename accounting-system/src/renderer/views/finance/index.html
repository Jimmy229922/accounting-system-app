<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المالية والخزينة</title>
    <link rel="stylesheet" href="../../assets/styles/main.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <script src="../../assets/js/theme.js"></script>
    <style>
        .content { padding: 30px; max-width: 1400px; margin: 0 auto; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .page-title {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: bold;
        }

        /* Stats Card */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.12); text-align: center; border: 1px solid var(--table-border); }
        .stat-title { font-size: 1.1rem; color: #9ca3af; margin-bottom: 15px; }
        [data-theme="dark"] .stat-title { color: #cbd5e1; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--text-color); }
        .stat-value.positive { color: #27ae60; }
        .stat-value.negative { color: #c0392b; }

        /* Form Card */
        .form-card { display: none; background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.12); margin-bottom: 30px; border: 1px solid var(--table-border); animation: slideDown 0.3s ease-out; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--table-border);
        }
        .form-header h3 { margin: 0; color: var(--text-color); }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group label { display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 1rem; transition: border-color 0.3s, box-shadow 0.3s; background: var(--input-bg); color: var(--text-color); }
        .form-control:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }

        /* Table */
        .table-card { background: var(--card-bg); border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.12); overflow: hidden; border: 1px solid var(--table-border); }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 15px 20px;
            text-align: right;
            border-bottom: 1px solid var(--table-border);
        }
        .table th {
            background-color: var(--table-header-bg);
            color: var(--text-color);
            font-weight: 700;
        }
        .table tr:hover { background-color: rgba(37,99,235,0.06); }
        [data-theme="dark"] .table tr:hover { background-color: rgba(96,165,250,0.08); }

        /* Badges & Colors */
        .badge { padding: 5px 12px; border-radius: 15px; font-size: 0.85rem; font-weight: 500; }
        .badge-income { background: var(--sales-bg); color: var(--sales-color); border: 1px solid var(--sales-color); }
        .badge-expense { background: var(--purchase-bg); color: var(--purchase-color); border: 1px solid var(--purchase-color); }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; display: inline-flex; align-items: center; gap: 8px; transition: background 0.3s, transform 0.08s, box-shadow 0.12s; }
        .btn-primary { background-color: var(--accent-color); color: white; box-shadow: 0 10px 20px rgba(37,99,235,0.25); }
        .btn-primary:hover { background-color: #1d4ed8; }
        
        .btn-success { background-color: #16a34a; color: white; }
        .btn-success:hover { background-color: #15803d; }
        
        .btn-outline { background-color: transparent; border: 1px solid var(--table-border); color: var(--text-color); }
        .btn-outline:hover { background-color: rgba(37,99,235,0.08); }

        .btn-sm { padding: 5px 10px; font-size: 0.9rem; }
        
        .btn-danger { background-color: #e11d48; color: white; }
        .btn-danger:hover { background-color: #be123c; }
        .btn-warning { background-color: #f59e0b; color: white; }
        .btn-warning:hover { background-color: #d97706; }

        /* Modal */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.4); 
        }
        .modal-content { background-color: var(--card-bg); margin: 10% auto; padding: 20px; border: 1px solid var(--table-border); width: 50%; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); color: var(--text-color); }
        .close { color: #9ca3af; float: left; font-size: 28px; font-weight: bold; }
        .close:hover,
        .close:focus { color: #e11d48; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="../../assets/js/toast.js"></script>
    <script src="finance.js"></script>
</body>
</html>
