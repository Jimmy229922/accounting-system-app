<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - نظام المحاسبة</title>
    <link rel="stylesheet" href="../../assets/styles/main.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <script src="../../assets/js/theme.js"></script>
    <style>
        .settings-container { background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.12); max-width: 900px; margin: 0 auto; border: 1px solid var(--table-border); }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--text-color); }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 1em; background: var(--input-bg); color: var(--text-color); transition: border-color 0.3s, box-shadow 0.3s; }
        .form-control:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }
        .btn-save { background-color: #16a34a; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1em; width: 100%; margin-top: 10px; box-shadow: 0 10px 20px rgba(22,163,74,0.25); }
        .btn-save:hover { background-color: #15803d; }
        h1 { color: var(--text-color); margin-bottom: 30px; border-bottom: 2px solid var(--table-border); padding-bottom: 10px; }
            .section-title { margin-top: 30px; margin-bottom: 12px; color: var(--text-color); }
            .card-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 16px;
            }
            .card { background: var(--card-bg); border: 1px solid var(--table-border); border-radius: 10px; padding: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
            .card h3 { margin-top: 0; margin-bottom: 8px; color: var(--text-color); }
            .card p { margin-top: 0; margin-bottom: 12px; color: #6b7280; font-size: 0.95em; }
            [data-theme="dark"] .card p { color: #9ca3af; }
            .btn-secondary,
            .btn-warning {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 1em;
                cursor: pointer;
                color: #fff;
                transition: transform 0.05s ease, box-shadow 0.1s ease;
            }
            .btn-secondary {
                background-color: #2563eb;
                box-shadow: 0 1px 4px rgba(37,99,235,0.35);
            }
            .btn-secondary:hover { background-color: #1d4ed8; }
            .btn-secondary:active { transform: translateY(1px); }
            .btn-warning {
                background-color: #f97316;
                box-shadow: 0 1px 4px rgba(249,115,22,0.35);
            }
            .btn-warning:hover { background-color: #ea580c; }
            .btn-warning:active { transform: translateY(1px); }
            .status-text { display: block; margin-top: 8px; color: var(--text-color); font-size: 0.9em; word-break: break-word; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="settings.js"></script>
</body>
</html>
