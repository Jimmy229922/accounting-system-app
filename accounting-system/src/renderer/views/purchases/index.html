<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فواتير المشتريات</title>
    <link rel="stylesheet" href="../../assets/styles/main.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../assets/styles/autocomplete.css">
    <script src="../../assets/js/theme.js"></script>
    <style>
        /* General Layout */
        .content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Section */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .page-title {
            font-size: 1.8rem;
            color: var(--primary-color);
            font-weight: bold;
            margin: 0;
        }
        
        .table th {
            background-color: var(--table-header-bg);
            color: var(--text-color);
            font-weight: 600;
        }

        /* Enhanced Card Styles */
        .table-card, .invoice-form-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            border: 1px solid var(--table-border);
            overflow: hidden;
        }
        .table tr:hover { background-color: rgba(37,99,235,0.06); }
        [data-theme="dark"] .table tr:hover { background-color: rgba(96,165,250,0.08); }
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            background-color: var(--purchase-bg);
            color: var(--purchase-color);
            border: 1px solid var(--purchase-color);
        }

        .btn-view {
            background-color: #3498db;
            color: white;
            padding: 6px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(52, 152, 219, 0.2);
        }

        .btn-view:hover {
            background-color: #2980b9;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
        }

        .btn-view:active {
            transform: translateY(0);
        }

        /* Invoice Form (Modal-like or Inline) */
        .invoice-form-container {
            display: block; /* Always visible as per sales page logic */
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--table-border);
        }
        
        .invoice-top-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            background-color: var(--input-bg);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--table-border);
        }

        .form-group label { display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 1rem; transition: border-color 0.3s, box-shadow 0.3s; background: var(--input-bg); color: var(--text-color); }
        select.form-control { background: var(--input-bg); color: var(--text-color); }
        [data-theme="dark"] select.form-control, select.form-control option { background: var(--input-bg); color: var(--text-color); }
        .form-control:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }

        /* Items Table in Form */
        .items-table {
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid var(--table-border);
            border-radius: 6px;
        }
        .items-table th {
            background-color: var(--table-header-bg);
            color: var(--text-color);
            padding: 12px;
        }
        .items-table td {
            padding: 10px;
            border-bottom: 1px solid var(--table-border);
        }
        .items-table input, .items-table select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-color);
        }


        
        /* Footer Section */
        .invoice-footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--table-border);
        }
        .totals-panel {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--table-border);
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .grand-total {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-color);
            border-top: 1px solid var(--table-border);
            padding-top: 10px;
            margin-top: 10px;
        }

        /* Buttons */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: background 0.3s, transform 0.08s, box-shadow 0.12s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background-color: var(--accent-color); color: white; box-shadow: 0 10px 20px rgba(37,99,235,0.25); }
        .btn-primary:hover { background-color: #1d4ed8; }
        
        .btn-success { background-color: #16a34a; color: white; }
        .btn-success:hover { background-color: #15803d; }

        .btn-danger { background-color: #e11d48; color: white; }
        .btn-danger:hover { background-color: #be123c; }

        .btn-secondary { background-color: #6b7280; color: white; }
        .btn-secondary:hover { background-color: #4b5563; }

        /* Autocomplete Customization */
        .autocomplete-items {
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            position: absolute;
            background-color: #fff;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .autocomplete-items div {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #d4d4d4;
        }
        .autocomplete-items div:hover {
            background-color: #e9e9e9;
        }
        .autocomplete-active {
            background-color: DodgerBlue !important;
            color: #ffffff;
        }
    </style>
</head>
<body data-disable-nav-search="true">
    <div id="app"></div>

    <!-- Scripts -->
    <script src="../../assets/js/autocomplete.js"></script>
    <script src="../../assets/js/toast.js"></script>
    <script src="purchases.js"></script>
</body>
</html>
