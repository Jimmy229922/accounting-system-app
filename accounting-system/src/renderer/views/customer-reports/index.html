<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير العملاء</title>
    <link rel="stylesheet" href="../../assets/styles/main.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/styles/autocomplete.css">
    <script src="../../assets/js/theme.js"></script>
    <style>
        .content { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .selection-card { background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.12); margin-bottom: 30px; text-align: center; border: 1px solid var(--table-border); }
        .form-control { padding: 10px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; font-size: 1.05rem; width: 300px; max-width: 100%; color: var(--text-color); transition: border-color 0.3s, box-shadow 0.3s; }
        .form-control:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }
        .report-container {
            display: none; /* Hidden until customer selected */
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.12); text-align: center; border: 1px solid var(--table-border); }
        .summary-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 10px;
        }
        .table-card { background: var(--card-bg); border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.12); overflow: hidden; border: 1px solid var(--table-border); }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 15px 20px; text-align: right; border-bottom: 1px solid var(--table-border); }
        .table th { background: var(--table-header-bg); font-weight: bold; color: var(--text-color); }
        .table tr:hover td { background-color: rgba(37,99,235,0.06); }
        [data-theme="dark"] .table tr:hover td { background-color: rgba(96,165,250,0.08); }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.85rem; font-weight: bold; }
        .badge-sales { background: var(--sales-bg); color: var(--sales-color); border: 1px solid var(--sales-color); }
        .badge-purchase { background: var(--purchase-bg); color: var(--purchase-color); border: 1px solid var(--purchase-color); }

        /* Top nav search button */
        .nav-search-btn { background: var(--accent-color); color: #fff; border: none; padding: 8px 14px; border-radius: 999px; cursor: pointer; box-shadow: 0 8px 16px rgba(37,99,235,0.18); display: inline-flex; align-items: center; gap: 6px; font-weight: 600; margin-right: 8px; }
        .nav-search-btn:hover { background: #1d4ed8; }
        .nav-links .nav-search-item { margin-right: 12px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="renderer.js"></script>
    <script src="../../assets/js/autocomplete.js"></script>
</body>
</html>
